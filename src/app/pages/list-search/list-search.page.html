<ion-header>
  <ion-toolbar>
    <ion-title>List & Search</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showHelp()">
        <ion-icon slot="icon-only" name="help-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Inventory Records</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      This page will display all inventory items and allow searching by item name.
    </ion-card-content>
  </ion-card>
</ion-content>
