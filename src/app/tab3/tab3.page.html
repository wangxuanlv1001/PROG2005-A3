<ion-header [translucent]="true">
  <ion-toolbar color="tertiary">
    <ion-title>Update / Delete</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showHelp()">
        <ion-icon slot="icon-only" name="help-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <!-- 搜索栏，用来找要修改/删除的记录 -->
  <ion-searchbar 
    placeholder="Enter exact item name to edit..." 
    [(ngModel)]="searchQuery" 
    (ionChange)="searchForEdit()" 
    [debounce]="800">
  </ion-searchbar>

  <div *ngIf="!selectedItem" class="ion-text-center" style="color: gray; margin-top: 20px;">
    <ion-icon name="search-outline" style="font-size: 3rem;"></ion-icon>
    <p>Please search for an item to edit or delete.</p>
  </div>

  <!-- 当搜索到商品时，显示修改表单 -->
  <div *ngIf="selectedItem">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Edit Item Details</ion-card-title>
      </ion-card-header>
      
      <ion-card-content>
        <ion-item>
          <ion-input label="Item Name*" labelPlacement="floating" type="text" [(ngModel)]="selectedItem.item_name"></ion-input>
        </ion-item>

        <ion-item>
          <ion-select label="Category*" labelPlacement="floating" [(ngModel)]="selectedItem.category">
            <ion-select-option value="Electronics">Electronics</ion-select-option>
            <ion-select-option value="Furniture">Furniture</ion-select-option>
            <ion-select-option value="Clothing">Clothing</ion-select-option>
            <ion-select-option value="Tools">Tools</ion-select-option>
            <ion-select-option value="Miscellaneous">Miscellaneous</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-input label="Quantity*" labelPlacement="floating" type="number" [(ngModel)]="selectedItem.quantity"></ion-input>
        </ion-item>

        <ion-item>
          <ion-input label="Price ($)*" labelPlacement="floating" type="number" [(ngModel)]="selectedItem.price"></ion-input>
        </ion-item>

        <ion-item>
          <ion-select label="Stock Status*" labelPlacement="floating" [(ngModel)]="selectedItem.stock_status">
            <ion-select-option value="In Stock">In Stock</ion-select-option>
            <ion-select-option value="Low Stock">Low Stock</ion-select-option>
            <ion-select-option value="Out of Stock">Out of Stock</ion-select-option>
          </ion-select>
        </ion-item>

        <!-- 按钮组：更新 & 删除 -->
        <ion-grid style="margin-top: 15px;">
          <ion-row>
            <ion-col size="6">
              <ion-button expand="block" color="danger" (click)="deleteItem()">
                <ion-icon name="trash-outline" slot="start"></ion-icon>
                Delete
              </ion-button>
            </ion-col>
            <ion-col size="6">
              <ion-button expand="block" color="success" (click)="updateItem()">
                <ion-icon name="save-outline" slot="start"></ion-icon>
                Update
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>

      </ion-card-content>
    </ion-card>
  </div>

</ion-content>
